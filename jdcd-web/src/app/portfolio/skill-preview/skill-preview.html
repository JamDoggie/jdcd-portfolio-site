<div class="skill-preview-wrapper">
    <div class="skill-preview-icon">
        <img [src]="'assets/skills/' + skillIcon()" />
    </div>

    <div class="skill-preview-panel">
        <span class="skill-preview-name skill-title">{{ skillName() }}</span>
        <span class="skill-preview-years">{{ skillYears() }}</span>
    </div>
</div>
