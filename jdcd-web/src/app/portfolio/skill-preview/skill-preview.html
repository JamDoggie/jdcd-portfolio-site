<div class="skill-preview-wrapper" (mouseenter)="enterPanel()" (mouseleave)="exitPanel()">
    <div #iconEl class="skill-preview-icon" [class.invert]="invert">
        <img
            [src]="skillIconUrl"
            [class.use-grayscale]="useGrayscale" />
    </div>

    <div #panelEl class="skill-preview-panel" [class.visible]="showPanel" [class.above]="panelAbove" [style.--panel-left]="panelLeft">
        <span class="skill-preview-name skill-title">{{ skillName }}</span>
        <span class="skill-preview-years" [innerHTML]="skillDescription"></span>
    </div>
</div>
