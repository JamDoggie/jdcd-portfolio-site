<div class="skill-preview-wrapper">
    <div class="skill-preview-icon" [class.invert]="invert">
        <img [src]="'assets/skills/' + skillIcon" (mouseenter)="enterPanel()" (mouseleave)="exitPanel()" />
    </div>

    <div class="skill-preview-panel" [class.visible]="showPanel">
        <span class="skill-preview-name skill-title">{{ skillName }}</span>
        <span class="skill-preview-years">{{ skillYears }}</span>
    </div>
</div>
