<div class="skill-preview-wrapper">
    <div #iconEl class="skill-preview-icon" [class.invert]="invert">
        <img [src]="skillIconUrl" (mouseenter)="enterPanel()" (mouseleave)="exitPanel()" />
    </div>

    <div class="skill-preview-panel" [class.visible]="showPanel" [style.--panel-left]="panelLeft">
        <span class="skill-preview-name skill-title">{{ skillName }}</span>
        <span class="skill-preview-years" [innerHTML]="skillDescription"></span>
    </div>
</div>
