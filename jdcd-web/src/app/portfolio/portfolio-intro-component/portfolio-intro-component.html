<div class="portfolio-rows">
    <div class="first-row">
        <img class="portrait-image" src="assets/images/jd-01.jpg" />
        <div class="intro-text">
            <span class="portrait-header section-header">My name is JD.</span>
            <span class="portrait-subheader">
                I'm a <b><i>software developer</i></b>,
                <b><i>game developer</i></b>, and <b><i>3D artist</i></b> based
                in Orlando, FL.</span>
        </div>
    </div>
    <div class="skills-row">
        <app-wavy-text-component class="skills-header section-header" />
        <div class="skills-bubble">
            <skill-preview [skillName]="'C#/.Net'" [skillIcon]="'csharp.svg'"
                [skillYears]="'9+ years of experience across multiple projects.'"></skill-preview>
            <skill-preview [skillName]="'Godot Engine'" [skillIcon]="'godot.svg'"
                [skillYears]="'3+ years of experience.'"></skill-preview>
            <skill-preview [skillName]="'Java'" [skillIcon]="'java.svg'"
                [skillYears]="'9+ years of experience intermittently.'"></skill-preview>
            <skill-preview [skillName]="'WPF/XAML/Avalonia'" [skillIcon]="'xaml.png'"
                [skillYears]="'3-4 years of experience across multiple projects.'"></skill-preview>
            <skill-preview [skillName]="'AngularJS'" [skillIcon]="'angular.svg'"
                [skillYears]="'Learned in one week for this website!'"></skill-preview>
            <skill-preview [skillName]="'MySQL'" [skillIcon]="'mysql.svg'"
                [skillYears]="'Intermediate knowledge from various personal projects.'"></skill-preview>
            <skill-preview [skillName]="'Blazor/Razor'" [skillIcon]="'blazor.svg'"
                [skillYears]="'Intermediate knowledge from various personal projects.'"></skill-preview>
            <skill-preview [skillName]="'ASP.NET'" [skillIcon]="'aspnet.svg'"
                [skillYears]="'Intermediate knowledge from various personal projects.'" [invert]="true"></skill-preview>
            <skill-preview [skillName]="'Unity Engine'" [skillIcon]="'unity.svg'"
                [skillYears]="'2-3 years of experience.'" [invert]="true"></skill-preview>
            <skill-preview [skillName]="'OpenGL'" [skillIcon]="'opengl.svg'"
                [skillYears]="'3-4 years of experience working with low-level graphics libraries such as OpenGL. Experience with accompanying shader languages.'"></skill-preview>
        </div>
    </div>
</div>
