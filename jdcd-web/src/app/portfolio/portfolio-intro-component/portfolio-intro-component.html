<div class="portfolio-rows">
    <div class="first-row" [class.visible]="firstRowVisible()">
        <img class="portrait-image" src="assets/images/jd-01.jpg" />
        <div class="intro-text">
            <span class="portrait-header section-header">My name is JD.</span>
            <span class="portrait-subheader">
                I'm a <b><i>software developer</i></b>,
                <b><i>game developer</i></b>, and <b><i>3D artist</i></b> based
                in Orlando, FL.</span>
            <div class="social-links-row">
                @for (link of socialLinks; track link.name) {
                    <div class="social-link-wrapper">
                        <a
                            class="social-link"
                            [href]="link.url"
                            target="_blank"
                            rel="noopener noreferrer"
                            [attr.aria-label]="'Visit ' + link.name">
                            <img
                                [src]="link.iconUrl"
                                [alt]="link.name + ' icon'"
                                [class.invert-logo]="link.name === 'LinkedIn' || link.name === 'Twitter / X'"
                                [class.github-logo]="link.name === 'GitHub'" />
                        </a>
                        <span class="social-link-hover-name">{{ link.name }}</span>
                    </div>
                }
            </div>
        </div>
    </div>
    <div class="skills-row">
        <app-wavy-text-component class="skills-header section-header" />
        <div class="skills-bubble">
            @for (skill of skills(); track skill.slug) {
                <skill-preview
                    [skillName]="skill.title"
                    [skillIconUrl]="skill.iconUrl"
                    [skillDescription]="skill.html"
                    [invert]="skill.invert"
                    [useGrayscale]="true"></skill-preview>
            }
        </div>
    </div>
</div>
